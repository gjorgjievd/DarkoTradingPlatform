services:
  tradingagent:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - tradingagent-data:/app/data
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - tradingagent
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  tradingagent-data:
