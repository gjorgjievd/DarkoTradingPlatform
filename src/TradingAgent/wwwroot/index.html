<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TradingAgent Dashboard</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <p class="brand">TradingAgent</p>
            <nav>
                <a href="#/home" class="nav-link" data-route="/home">Home</a>
                <a href="#/signals" class="nav-link" data-route="/signals">Signals</a>
                <a href="#/positions" class="nav-link" data-route="/positions">Positions</a>
                <a href="#/webhooks" class="nav-link" data-route="/webhooks">Webhooks</a>
                <a href="#/market" class="nav-link" data-route="/market">Market</a>
                <a href="#/settings" class="nav-link" data-route="/settings">Settings</a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="btn-row">
                    <button class="mobile-toggle" id="sidebar-toggle" type="button">Menu</button>
                    <h1 id="page-title">Home</h1>
                </div>
                <span class="status-text" id="status-text"></span>
            </header>
            <div class="page-content" id="page-content"></div>
        </main>
    </div>

    <div class="modal-backdrop hidden" id="modal-backdrop">
        <div class="modal" role="dialog" aria-modal="true">
            <div class="modal-header">
                <h3 id="modal-title">Details</h3>
                <button class="ghost" id="modal-close" type="button">Close</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/pagination.js"></script>
    <script src="/js/pages/home.js"></script>
    <script src="/js/pages/signals.js"></script>
    <script src="/js/pages/positions.js"></script>
    <script src="/js/pages/webhooks.js"></script>
    <script src="/js/pages/market.js"></script>
    <script src="/js/pages/settings.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
