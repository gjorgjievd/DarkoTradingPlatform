<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TradingAgent Dashboard</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #111827;
            color: #f3f4f6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        h1, h2 {
            margin-top: 0;
        }

        .toolbar,
        .cards {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .toolbar {
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            align-items: end;
        }

        .cards {
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        }

        .card,
        .panel {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 10px;
            padding: 16px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        input,
        textarea,
        button {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #4b5563;
            background: #111827;
            color: #f9fafb;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: #2563eb;
            border: none;
            font-weight: bold;
        }

        button.secondary {
            background: #374151;
        }

        button.danger {
            background: #b91c1c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #374151;
            text-align: left;
            vertical-align: top;
        }

        .actions {
            display: grid;
            gap: 8px;
        }

        .pill {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            background: #374151;
            font-size: 0.85rem;
        }

        .status {
            margin-bottom: 16px;
            color: #93c5fd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TradingAgent Dashboard</h1>
        <p class="status" id="status">Loading signals...</p>

        <div class="toolbar panel">
            <div>
                <label for="symbolFilter">Filter by symbol</label>
                <input id="symbolFilter" placeholder="e.g. NVDA" />
            </div>
            <div>
                <button id="refreshButton">Refresh</button>
            </div>
        </div>

        <div class="cards" id="summaryCards"></div>

        <div class="panel">
            <h2>Latest signals</h2>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Signal</th>
                            <th>Reason</th>
                            <th>Trade details</th>
                            <th>Edit</th>
                        </tr>
                    </thead>
                    <tbody id="signalsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const statusElement = document.getElementById('status');
        const summaryCards = document.getElementById('summaryCards');
        const signalsBody = document.getElementById('signalsBody');
        const symbolFilter = document.getElementById('symbolFilter');
        const refreshButton = document.getElementById('refreshButton');

        refreshButton.addEventListener('click', loadSignals);
        symbolFilter.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                loadSignals();
            }
        });

        async function loadSignals() {
            statusElement.textContent = 'Loading signals...';
            const symbol = symbolFilter.value.trim();
            const url = symbol ? `/api/signals?symbol=${encodeURIComponent(symbol)}` : '/api/signals';

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }

                const signals = await response.json();
                renderSummary(signals);
                renderSignals(signals);
                statusElement.textContent = `Loaded ${signals.length} signal(s).`;
            } catch (error) {
                statusElement.textContent = error.message;
            }
        }

        function renderSummary(signals) {
            const summary = {
                total: signals.length,
                buy: 0,
                sell: 0,
                wait: 0,
                ignore: 0,
                wins: 0,
                losses: 0,
                totalProfitLoss: 0
            };

            for (const signal of signals) {
                const action = (signal.claudeAction || signal.originalSignal || '').toUpperCase();
                if (action === 'BUY') summary.buy++;
                if (action === 'SELL') summary.sell++;
                if (action === 'WAIT') summary.wait++;
                if (action === 'IGNORE') summary.ignore++;

                if (typeof signal.profitLoss === 'number') {
                    summary.totalProfitLoss += signal.profitLoss;
                    if (signal.profitLoss > 0) summary.wins++;
                    if (signal.profitLoss < 0) summary.losses++;
                }
            }

            const cards = [
                ['Total trades', summary.total],
                ['BUY', summary.buy],
                ['SELL', summary.sell],
                ['WAIT', summary.wait],
                ['IGNORE', summary.ignore],
                ['Wins', summary.wins],
                ['Losses', summary.losses],
                ['Total P/L', summary.totalProfitLoss.toFixed(2)]
            ];

            summaryCards.innerHTML = cards.map(([label, value]) => `
                <div class="card">
                    <div>${label}</div>
                    <strong style="font-size: 1.6rem;">${value}</strong>
                </div>
            `).join('');
        }

        function renderSignals(signals) {
            if (signals.length === 0) {
                signalsBody.innerHTML = '<tr><td colspan="5">No signals found.</td></tr>';
                return;
            }

            signalsBody.innerHTML = signals.map((signal) => `
                <tr>
                    <td>${signal.id}<br /><span class="pill">${formatDate(signal.createdAtUtc)}</span></td>
                    <td>
                        <strong>${signal.symbol}</strong><br />
                        Original: ${signal.originalSignal}<br />
                        Claude: ${signal.claudeAction || 'N/A'}<br />
                        Confidence: ${signal.confidence ?? 'N/A'}<br />
                        Risk: ${signal.riskLevel || 'N/A'}
                    </td>
                    <td>${escapeHtml(signal.shortReason || 'No analysis captured.')}</td>
                    <td>
                        Price: ${formatValue(signal.price)}<br />
                        Timeframe: ${signal.timeframe || 'N/A'}<br />
                        Strategy: ${signal.strategy || 'N/A'}<br />
                        Stop Loss: ${formatValue(signal.suggestedStopLoss)}<br />
                        Take Profit: ${formatValue(signal.suggestedTakeProfit)}
                    </td>
                    <td>
                        <div class="actions">
                            <input id="profitLoss-${signal.id}" type="number" step="0.01" placeholder="Profit/Loss" value="${signal.profitLoss ?? ''}" />
                            <textarea id="notes-${signal.id}" rows="3" placeholder="Notes">${escapeHtml(signal.notes || '')}</textarea>
                            <label><input id="isClosed-${signal.id}" type="checkbox" style="width:auto;" ${signal.isClosed ? 'checked' : ''} /> Closed</label>
                            <button onclick="saveSignal(${signal.id})">Save</button>
                            <button class="danger" onclick="deleteSignal(${signal.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function saveSignal(id) {
            const profitLossValue = document.getElementById(`profitLoss-${id}`).value;
            const notesValue = document.getElementById(`notes-${id}`).value;
            const isClosedValue = document.getElementById(`isClosed-${id}`).checked;

            const payload = {
                notes: notesValue,
                isClosed: isClosedValue
            };

            if (profitLossValue !== '') {
                payload.profitLoss = Number(profitLossValue);
            }

            const response = await fetch(`/api/signals/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                statusElement.textContent = `Failed to save signal ${id}.`;
                return;
            }

            statusElement.textContent = `Signal ${id} updated.`;
            await loadSignals();
        }

        async function deleteSignal(id) {
            if (!confirm(`Delete signal ${id}?`)) {
                return;
            }

            const response = await fetch(`/api/signals/${id}`, { method: 'DELETE' });
            if (!response.ok) {
                statusElement.textContent = `Failed to delete signal ${id}.`;
                return;
            }

            statusElement.textContent = `Signal ${id} deleted.`;
            await loadSignals();
        }

        function formatDate(value) {
            return value ? new Date(value).toLocaleString() : 'N/A';
        }

        function formatValue(value) {
            return typeof value === 'number' ? value.toFixed(2) : 'N/A';
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;');
        }

        loadSignals();
    </script>
</body>
</html>
